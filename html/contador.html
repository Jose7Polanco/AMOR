<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TIEMPO JUNTOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fdf8e7 0%, #fef4d9 50%, #fff3e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Marco decorativo */
        .sunflower-frame {
            position: relative;
            max-width: 780px;
            width: 100%;
            background: rgba(255, 248, 225, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 72px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 30px 45px -20px rgba(110, 60, 0, 0.3), inset 0 1px 3px rgba(255, 255, 200, 0.8);
            border: 1px solid rgba(255, 215, 130, 0.6);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .counter-container {
            text-align: center;
            position: relative;
            z-index: 5;
        }

        /* Cabecera con girasoles laterales */
        .flower-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .mini-sunflower {
            width: 58px;
            height: 58px;
            animation: gentleSpin 12s infinite linear;
        }

        .mini-sunflower svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        @keyframes gentleSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #c27e0e, #f5b042, #e6a017);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
            font-family: 'Quicksand', sans-serif;
            padding: 0 8px;
        }

        /* Girasol central grande */
        .sunflower-badge {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            transform: scale(1);
            animation: softBreathing 3s ease-in-out infinite;
        }

        @keyframes softBreathing {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }

        .giant-flower {
            width: 140px;
            height: 140px;
        }

        /* Tarjeta del contador */
        .time-card {
            background: rgba(255, 252, 240, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 68px;
            padding: 2rem 1.8rem;
            margin: 20px 0 28px;
            box-shadow: 0 20px 35px -12px rgba(100, 55, 0, 0.2), inset 0 1px 0 rgba(255, 255, 210, 0.9);
            border: 1px solid #ffecb3;
        }

        .counter-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
            row-gap: 1.5rem;
        }

        .time-unit {
            background: #fffef7;
            border-radius: 56px;
            padding: 0.8rem 1.2rem;
            min-width: 105px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 245, 180, 0.9);
            transition: all 0.2s;
        }

        .number {
            font-size: 3.6rem;
            font-weight: 800;
            font-family: 'Quicksand', monospace;
            background: linear-gradient(145deg, #e6a017, #c47d0a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
            letter-spacing: 2px;
        }

        .unit-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #b47c3e;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .love-message {
            margin: 20px 0 16px;
            font-style: italic;
            font-weight: 500;
            color: #ad7a3d;
            background: rgba(255, 235, 190, 0.5);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            backdrop-filter: blur(2px);
        }

        .signature-flower {
            font-family: 'Quicksand', sans-serif;
            font-weight: 400;
            color: #bc8a4a;
            margin-top: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        hr {
            width: 60px;
            height: 2px;
            background: radial-gradient(circle, #f3c26b, transparent);
            border: none;
            margin: 0 auto;
        }

        /* Girasoles flotantes de fondo (estáticos decorativos) */
        .bg-sunflower {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            opacity: 0.45;
            animation: floatAround 20s infinite alternate ease-in-out;
        }

        @keyframes floatAround {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            100% {
                transform: translateY(-25px) rotate(8deg);
            }
        }

        /* === NUEVO: BURBUJAS QUE SON GIRASOLES (suben desde abajo) === */
        .bubble-sunflower {
            position: fixed;
            bottom: -30px;
            pointer-events: none;
            z-index: 200;
            width: 42px;
            height: 42px;
            opacity: 0;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
            animation: floatUpSunflower 8s ease-in-out forwards;
        }

        @keyframes floatUpSunflower {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5) rotate(0deg);
                bottom: -20px;
            }

            15% {
                opacity: 0.85;
            }

            50% {
                opacity: 0.95;
                transform: translateY(-45vh) scale(1.05) rotate(12deg);
            }

            85% {
                opacity: 0.7;
            }

            100% {
                opacity: 0;
                transform: translateY(-95vh) scale(0.8) rotate(25deg);
                bottom: 110%;
            }
        }

        /* Variación de tamaño para burbujas */
        .bubble-sunflower.small {
            width: 32px;
            height: 32px;
            animation-duration: 7s;
        }

        .bubble-sunflower.medium {
            width: 48px;
            height: 48px;
            animation-duration: 9s;
        }

        .bubble-sunflower.large {
            width: 62px;
            height: 62px;
            animation-duration: 11s;
        }

        @media (max-width: 550px) {
            .sunflower-frame {
                padding: 1.5rem;
            }

            .number {
                font-size: 2.5rem;
            }

            .time-unit {
                padding: 0.5rem 0.8rem;
                min-width: 75px;
            }

            .title {
                font-size: 1.7rem;
                letter-spacing: 1px;
            }

            .giant-flower {
                width: 100px;
                height: 100px;
            }

            .mini-sunflower {
                width: 42px;
                height: 42px;
            }

            .bubble-sunflower {
                width: 35px;
                height: 35px;
            }

            .bubble-sunflower.medium {
                width: 42px;
                height: 42px;
            }

            .bubble-sunflower.large {
                width: 55px;
                height: 55px;
            }
        }

        /* pequeña animación de brillo en tarjeta */
        .time-card {
            transition: box-shadow 0.3s;
        }
    </style>
</head>

<body>

    <!-- Girasoles decorativos de fondo fijos -->
    <div class="bg-sunflower" style="top: 5%; left: 2%; width: 70px; height: 70px; animation-duration: 18s;">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="18" fill="#f5b342" />
            <g fill="#ffdd77">
                <ellipse cx="50" cy="20" rx="7" ry="14" />
                <ellipse cx="50" cy="80" rx="7" ry="14" />
                <ellipse cx="20" cy="50" rx="14" ry="7" />
                <ellipse cx="80" cy="50" rx="14" ry="7" />
                <ellipse cx="29" cy="29" rx="12" ry="7" transform="rotate(45 29 29)" />
                <ellipse cx="71" cy="71" rx="12" ry="7" transform="rotate(45 71 71)" />
                <ellipse cx="71" cy="29" rx="12" ry="7" transform="rotate(-45 71 29)" />
                <ellipse cx="29" cy="71" rx="12" ry="7" transform="rotate(-45 29 71)" />
            </g>
        </svg>
    </div>
    <div class="bg-sunflower"
        style="bottom: 8%; right: 3%; width: 85px; height: 85px; animation-duration: 22s; opacity: 0.4;">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="20" fill="#f5b342" />
            <g fill="#ffdd77">
                <ellipse cx="50" cy="18" rx="8" ry="16" />
                <ellipse cx="50" cy="82" rx="8" ry="16" />
                <ellipse cx="18" cy="50" rx="16" ry="8" />
                <ellipse cx="82" cy="50" rx="16" ry="8" />
                <ellipse cx="27" cy="27" rx="13" ry="8" transform="rotate(45 27 27)" />
                <ellipse cx="73" cy="73" rx="13" ry="8" transform="rotate(45 73 73)" />
                <ellipse cx="73" cy="27" rx="13" ry="8" transform="rotate(-45 73 27)" />
                <ellipse cx="27" cy="73" rx="13" ry="8" transform="rotate(-45 27 73)" />
            </g>
        </svg>
    </div>

    <div class="sunflower-frame">
        <div class="counter-container">

            <div class="flower-header">
                <div class="mini-sunflower">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="16" fill="#f2b13b" />
                        <g fill="#ffdd88">
                            <ellipse cx="50" cy="22" rx="6" ry="12" />
                            <ellipse cx="50" cy="78" rx="6" ry="12" />
                            <ellipse cx="22" cy="50" rx="12" ry="6" />
                            <ellipse cx="78" cy="50" rx="12" ry="6" />
                            <ellipse cx="30" cy="30" rx="10" ry="6" transform="rotate(45 30 30)" />
                            <ellipse cx="70" cy="70" rx="10" ry="6" transform="rotate(45 70 70)" />
                            <ellipse cx="70" cy="30" rx="10" ry="6" transform="rotate(-45 70 30)" />
                            <ellipse cx="30" cy="70" rx="10" ry="6" transform="rotate(-45 30 70)" />
                        </g>
                    </svg>
                </div>
                <span class="title">TIEMPO JUNTOS</span>
                <div class="mini-sunflower">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="16" fill="#f2b13b" />
                        <g fill="#ffdd88">
                            <ellipse cx="50" cy="22" rx="6" ry="12" />
                            <ellipse cx="50" cy="78" rx="6" ry="12" />
                            <ellipse cx="22" cy="50" rx="12" ry="6" />
                            <ellipse cx="78" cy="50" rx="12" ry="6" />
                            <ellipse cx="30" cy="30" rx="10" ry="6" transform="rotate(45 30 30)" />
                            <ellipse cx="70" cy="70" rx="10" ry="6" transform="rotate(45 70 70)" />
                            <ellipse cx="70" cy="30" rx="10" ry="6" transform="rotate(-45 70 30)" />
                            <ellipse cx="30" cy="70" rx="10" ry="6" transform="rotate(-45 30 70)" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="sunflower-badge">
                <div class="giant-flower">
                    <svg viewBox="0 0 200 200">
                        <defs>
                            <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#F5BC4A" />
                                <stop offset="70%" stop-color="#D98E1F" />
                                <stop offset="100%" stop-color="#B26B0E" />
                            </radialGradient>
                            <radialGradient id="petalGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#FFE484" stop-opacity="0.9" />
                                <stop offset="100%" stop-color="#FFC247" stop-opacity="0.3" />
                            </radialGradient>
                        </defs>
                        <g fill="url(#petalGlow)" stroke="#e7a22e" stroke-width="1.2">
                            <ellipse cx="100" cy="42" rx="16" ry="38" />
                            <ellipse cx="100" cy="158" rx="16" ry="38" />
                            <ellipse cx="42" cy="100" rx="38" ry="16" />
                            <ellipse cx="158" cy="100" rx="38" ry="16" />
                            <ellipse cx="59" cy="59" rx="28" ry="18" transform="rotate(45 59 59)" />
                            <ellipse cx="141" cy="141" rx="28" ry="18" transform="rotate(45 141 141)" />
                            <ellipse cx="141" cy="59" rx="28" ry="18" transform="rotate(-45 141 59)" />
                            <ellipse cx="59" cy="141" rx="28" ry="18" transform="rotate(-45 59 141)" />
                        </g>
                        <g fill="#FFD966" stroke="#cb7b1a" stroke-width="0.8">
                            <ellipse cx="100" cy="60" rx="11" ry="27" />
                            <ellipse cx="100" cy="140" rx="11" ry="27" />
                            <ellipse cx="60" cy="100" rx="27" ry="11" />
                            <ellipse cx="140" cy="100" rx="27" ry="11" />
                            <ellipse cx="72" cy="72" rx="20" ry="13" transform="rotate(45 72 72)" />
                            <ellipse cx="128" cy="128" rx="20" ry="13" transform="rotate(45 128 128)" />
                            <ellipse cx="128" cy="72" rx="20" ry="13" transform="rotate(-45 128 72)" />
                            <ellipse cx="72" cy="128" rx="20" ry="13" transform="rotate(-45 72 128)" />
                        </g>
                        <circle cx="100" cy="100" r="34" fill="url(#centerGrad)" stroke="#A15506" stroke-width="1.5" />
                        <circle cx="100" cy="100" r="22" fill="none" stroke="#FAD46D" stroke-width="1"
                            stroke-dasharray="4 3" />
                        <circle cx="100" cy="100" r="12" fill="#FFE29A" opacity="0.5" />
                        <g fill="#A55D1A" opacity="0.7">
                            <circle cx="100" cy="78" r="2.2" />
                            <circle cx="100" cy="122" r="2.2" />
                            <circle cx="78" cy="100" r="2.2" />
                            <circle cx="122" cy="100" r="2.2" />
                            <circle cx="84" cy="84" r="2" />
                            <circle cx="116" cy="116" r="2" />
                            <circle cx="116" cy="84" r="2" />
                            <circle cx="84" cy="116" r="2" />
                            <circle cx="100" cy="92" r="1.8" />
                            <circle cx="100" cy="108" r="1.8" />
                            <circle cx="92" cy="100" r="1.8" />
                            <circle cx="108" cy="100" r="1.8" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="time-card">
                <div class="counter-display">
                    <div class="time-unit">
                        <div class="number" id="days">0</div>
                        <div class="unit-label">DÍAS</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="hours">00</div>
                        <div class="unit-label">HORAS</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="minutes">00</div>
                        <div class="unit-label">MINUTOS</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="seconds">00</div>
                        <div class="unit-label">SEGUNDOS</div>
                    </div>
                </div>
            </div>

            <div class="love-message">
                ✿ CADA SEGUNDO FLORECE JUNTO A TI ✿
            </div>

            <div class="signature-flower">
                <hr style="width: 35px;">
                <span>🌻 A TU LADO LA VIDA ES MAS BONITA 🌻</span>
                <hr style="width: 35px;">
            </div>
            <div style="margin-top: 12px; font-size: 0.75rem; color:#cb9b5e; letter-spacing: 1px;">
                NO TE CAMBIO POR NADA
            </div>
        </div>
    </div>

    <script>
        (function () {
            // Fecha de inicio (7 febrero 2026)
            const startDate = new Date(2026, 1, 7, 0, 0, 0);

            function updateTimer() {
                const now = new Date();
                const diffMs = now - startDate;

                if (diffMs < 0) {
                    document.getElementById('days').innerText = '0';
                    document.getElementById('hours').innerText = '00';
                    document.getElementById('minutes').innerText = '00';
                    document.getElementById('seconds').innerText = '00';
                    return;
                }

                const totalSeconds = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                document.getElementById('days').innerText = days;
                document.getElementById('hours').innerText = String(hours).padStart(2, '0');
                document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
                document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);

            // Función para crear un girasol burbuja (sube desde abajo)
            function createSunflowerBubble() {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble-sunflower');

                // Asignar tamaño aleatorio
                const sizeType = Math.random();
                if (sizeType < 0.33) bubble.classList.add('small');
                else if (sizeType < 0.66) bubble.classList.add('medium');
                else bubble.classList.add('large');

                // Posición horizontal aleatoria (ancho de la pantalla)
                const randomLeft = Math.random() * 100; // %
                bubble.style.left = `${randomLeft}%`;

                // Retraso aleatorio para que no salgan todos sincronizados
                const randomDelay = Math.random() * 5;
                bubble.style.animationDelay = `${randomDelay}s`;

                // Contenido SVG del girasol (hermoso y colorido)
                bubble.innerHTML = `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; display:block;">
          <circle cx="50" cy="50" r="16" fill="#f5bc4a" stroke="#d48d1a" stroke-width="0.7"/>
          <g fill="#ffdd88" stroke="#e7a22e" stroke-width="0.4">
            <ellipse cx="50" cy="22" rx="6" ry="12" />
            <ellipse cx="50" cy="78" rx="6" ry="12" />
            <ellipse cx="22" cy="50" rx="12" ry="6" />
            <ellipse cx="78" cy="50" rx="12" ry="6" />
            <ellipse cx="30" cy="30" rx="10" ry="6" transform="rotate(45 30 30)" />
            <ellipse cx="70" cy="70" rx="10" ry="6" transform="rotate(45 70 70)" />
            <ellipse cx="70" cy="30" rx="10" ry="6" transform="rotate(-45 70 30)" />
            <ellipse cx="30" cy="70" rx="10" ry="6" transform="rotate(-45 30 70)" />
          </g>
          <!-- Detalle interno -->
          <circle cx="50" cy="50" r="10" fill="#e0a035" />
          <circle cx="50" cy="50" r="5" fill="#f5d742" opacity="0.8" />
          <g fill="#874e1a" opacity="0.6">
            <circle cx="45" cy="48" r="1.2" /><circle cx="55" cy="52" r="1.2" />
            <circle cx="52" cy="47" r="1.1" /><circle cx="48" cy="53" r="1.1" />
          </g>
        </svg>
      `;

                document.body.appendChild(bubble);

                // Eliminar burbuja después de que termine la animación (aprox duración máxima + retardo)
                const duration = bubble.classList.contains('small') ? 7000 : (bubble.classList.contains('medium') ? 9000 : 11000);
                setTimeout(() => {
                    if (bubble && bubble.remove) bubble.remove();
                }, duration + randomDelay * 1000 + 500);
            }

            // Generar girasoles-burbuja continuamente (cada 1.2 segundos)
            let bubbleInterval = setInterval(() => {
                createSunflowerBubble();
                // A veces generar dos casi al mismo tiempo para mayor efecto
                if (Math.random() > 0.7) {
                    setTimeout(() => createSunflowerBubble(), 200);
                }
            }, 1300);

            // También crear algunas burbujas iniciales rápidas
            for (let i = 0; i < 6; i++) {
                setTimeout(() => createSunflowerBubble(), i * 400);
            }

            // Pequeño efecto de rebote en los números cuando cambian
            const numberElements = document.querySelectorAll('.number');
            function addBounceEffect() {
                numberElements.forEach(el => {
                    const observer = new MutationObserver(() => {
                        el.style.transform = 'scale(1.07)';
                        setTimeout(() => { if (el) el.style.transform = 'scale(1)'; }, 160);
                    });
                    observer.observe(el, { childList: true, characterData: true, subtree: true });
                });
            }
            addBounceEffect();

            // Brillo periódico en la tarjeta
            setInterval(() => {
                const card = document.querySelector('.time-card');
                if (card) {
                    card.style.transition = 'box-shadow 0.25s';
                    card.style.boxShadow = '0 20px 45px -8px rgba(230, 150, 30, 0.5), inset 0 1px 0 rgba(255,255,210,1)';
                    setTimeout(() => {
                        if (card) card.style.boxShadow = '0 20px 35px -12px rgba(100, 55, 0, 0.2), inset 0 1px 0 rgba(255,255,210,0.9)';
                    }, 400);
                }
            }, 5200);

            // Limpiar el intervalo si la página se cierra (opcional)
            window.addEventListener('beforeunload', () => {
                if (bubbleInterval) clearInterval(bubbleInterval);
            });
        })();
    </script>
</body>

</html>
